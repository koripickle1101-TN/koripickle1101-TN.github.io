<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOL SUMMIT RCM COMMAND CENTER</title>
    <style>
        :root { --vol-orange: #FF8200; --smokey-gray: #4B4B4B; --black: #0A0A0A; --white: #FFFFFF; }
        body { background-color: var(--black); color: var(--white); font-family: sans-serif; margin: 0; }
        .container { padding: 40px; max-width: 1000px; margin: auto; }
        .header { border-left: 8px solid var(--vol-orange); padding-left: 20px; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; color: var(--vol-orange); text-transform: uppercase; }
        .system-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .module-card { background: var(--smokey-gray); padding: 25px; border-radius: 4px; cursor: pointer; transition: 0.3s; border-bottom: 4px solid transparent; }
        .module-card:hover { transform: scale(1.02); border-bottom: 4px solid var(--vol-orange); }
        .status-dot { height: 10px; width: 10px; background-color: var(--vol-orange); border-radius: 50%; display: inline-block; margin-right: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .overlay-content { background: var(--smokey-gray); padding: 30px; border: 2px solid var(--vol-orange); max-width: 500px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Vol Summit RCM™</h1>
            <p>Operational Systems Architecture | Mascot, TN</p>
        </div>
        <div class="system-grid">
            <div class="module-card" onclick="openMod('Base Camp', 'Intake Automation: High-speed patient data check.')">
                <div class="status-dot"></div>
                <h2>Summit Base Camp™</h2>
                <p>Intake & Data Integrity</p>
            </div>
            <div class="module-card" onclick="openMod('Ascent', 'Prior Auth Engine: Automatic insurance approval logic.')">
                <div class="status-dot"></div>
                <h2>Summit Ascent™</h2>
                <p>Prior Auth & Mapping</p>
            </div>
            <div class="module-card" onclick="openMod('Peak', 'Denial Recovery: Finding and fixing unpaid claims.')">
                <div class="status-dot"></div>
                <h2>Summit Peak™</h2>
                <p>Predictive Recovery</p>
            </div>
        </div>
    </div>
    <div id="overlay" class="overlay" onclick="closeMod()">
        <div class="overlay-content">
            <h2 id="m-title" style="color:var(--vol-orange)"></h2>
            <p id="m-body"></p>
            <p style="font-size: 0.8rem; color: var(--vol-orange);">TAP ANYWHERE TO CLOSE</p>
        </div>
    </div>
    <script>
        function openMod(t, b) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-body').innerText = b;
            document.getElementById('overlay').style.display = 'flex';
        }
        function closeMod() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
